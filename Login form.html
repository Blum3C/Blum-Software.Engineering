    <body>
        <h1>GeeksforGeeks</h1>
        <h2>Signup for Geeks</h2>
        
        <form>
            <label for="uname">Username</label><br>
            <input type="text" placeholder="Enter your Username"><br>
            <label for="pword">Password</label><br>
            <input type="text" placeholder="Enter your Password"><br>
            <label for="nat">Nationality</label><br>

                <option value="">Select Country</option><br>
                <option value="Nigerian">Nigerian</option><br>
                <option value="Ghanian">Ghanian</option><br>
                <option value="Kenyan">Kenyan</option><br>
                <option value="Congolese">Congolese</option>
            </select><br>
            <label for="sex">Gender</label><br>

                <option value="">Select gender</option><br>
                <option value="Female">Female</option><br>
                <option value="Male">Male</option><br>
            </select>
            <label for="Course of choice">Course of choice</label><br>
            <select id="course" name="course">
                <option value="">Select Course</option><br>
                <option value="Medicine">Medicine</option><br>
                <option value="Law">Law</option><br>
                <option value="Economics">Economics</option><br>
            </select>
            <button type="submit">Register</button>
              </form>
        
    </body>
