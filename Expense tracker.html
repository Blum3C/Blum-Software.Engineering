<!DOCTYPE html>
<html>
<head>
    <h2>Personal Expense Tracker</h2>
<style>
table {
  font-family: arial, sans-serif;
  border-collapse: collapse;
  width: 100%;
}

td, th {
  border: 1px solid #dddddd;
  text-align: left;
  padding: 8px;
}

tr:nth-child(even) {
  background-color: #dddddd;
}
</style>
</head>
<body>
    <h2>HTML Table</h2>
    <table>
      <tr>
        <th>Items</th>
        <th>Category</th>
        <th>Price</th>
      </tr>
      <tr>
        <td>Duplex</td>
        <td>Housing</td>
        <td>$150</td>
  </tr>
  <tr>
    <td>Headphones</td>
    <td>Gadgets</td>
    <td>$38.50</td>
  </tr>
  <tr>
    <td>Water</td>
    <td>Utility</td>
    <td>$20</td>
  </tr>
  <tr>
    <td>Gym</td>
    <td>Fitness</td>
    <td>$40</td>
</tr>
<tr>
  <td>Electricity bill</td>
  <td>Bills</td>
  <td>$53</td>
</tr>
<tr>
  <td>Laptop</td>
 <td>Education</td>
  <td>$250</td>
  </tr>
<tr>
    <td>Buenos Aries</td>
    <td>Travel</td>
    <td>$120</td>
</tr>
<tr>
    <th colspan="2"><strong>Total expenses</strong></th>
    <td>$671.5</td>
    
</tr>
    </table>
</table>

</body>
</html>
